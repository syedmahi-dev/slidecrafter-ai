
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .stage {
    min-height: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 3rem 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(83,74,183,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(83,74,183,0.06) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.2s forwards;
  }

  .slide-stack {
    position: relative;
    width: 260px;
    height: 162px;
    margin-bottom: 2.8rem;
  }

  .slide {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    border: 1px solid rgba(83,74,183,0.18);
  }

  .slide-3 {
    background: #EEEDFE;
    transform: rotate(-5deg) translateY(8px);
    animation: rock3 3.6s ease-in-out infinite;
  }

  .slide-2 {
    background: #CECBF6;
    transform: rotate(2.5deg) translateY(4px);
    animation: rock2 3.6s ease-in-out infinite;
  }

  .slide-1 {
    background: #534AB7;
    transform: rotate(0deg);
    animation: rock1 3.6s ease-in-out infinite;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 20px 24px;
    gap: 10px;
  }

  .slide-line {
    height: 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.85);
    animation: shimmer 1.8s ease-in-out infinite;
  }
  .slide-line:nth-child(1) { width: 65%; animation-delay: 0s; }
  .slide-line:nth-child(2) { width: 45%; height: 7px; background: rgba(255,255,255,0.5); animation-delay: 0.15s; }
  .slide-line:nth-child(3) { width: 80%; height: 6px; background: rgba(255,255,255,0.3); margin-top: 4px; animation-delay: 0.3s; }
  .slide-line:nth-child(4) { width: 60%; height: 6px; background: rgba(255,255,255,0.3); animation-delay: 0.45s; }

  .dot-row {
    position: absolute;
    bottom: 10px;
    right: 14px;
    display: flex;
    gap: 5px;
  }
  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
  }
  .dot.active { background: rgba(255,255,255,0.95); }

  @keyframes rock3 {
    0%,100% { transform: rotate(-5deg) translateY(8px); }
    50%      { transform: rotate(-7deg) translateY(10px); }
  }
  @keyframes rock2 {
    0%,100% { transform: rotate(2.5deg) translateY(4px); }
    50%      { transform: rotate(4deg) translateY(6px); }
  }
  @keyframes rock1 {
    0%,100% { transform: rotate(0deg); }
    50%      { transform: rotate(1deg) translateY(-2px); }
  }
  @keyframes shimmer {
    0%,100% { opacity: 0.9; }
    50%      { opacity: 0.4; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .status-text {
    font-size: 17px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.5s forwards;
  }

  .sub-text {
    font-size: 13px;
    color: var(--color-text-tertiary);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.7s forwards;
  }

  .progress-track {
    width: 240px;
    height: 4px;
    background: rgba(83,74,183,0.12);
    border-radius: 99px;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.9s forwards;
    margin-bottom: 2rem;
  }

  .progress-bar {
    height: 100%;
    background: #534AB7;
    border-radius: 99px;
    animation: fillBar 3.4s cubic-bezier(0.4,0,0.2,1) forwards;
    transform-origin: left;
  }
  @keyframes fillBar {
    0%   { width: 0%; }
    20%  { width: 22%; }
    45%  { width: 51%; }
    70%  { width: 74%; }
    90%  { width: 88%; }
    100% { width: 95%; }
  }

  .steps {
    display: flex;
    gap: 20px;
    opacity: 0;
    animation: fadeUp 0.5s ease 1.1s forwards;
  }

  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .step-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    border: 1.5px solid transparent;
    transition: all 0.4s ease;
  }

  .step-icon.done {
    background: #EEEDFE;
    border-color: #534AB7;
    color: #534AB7;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  .step-icon.active {
    background: #534AB7;
    border-color: #534AB7;
    color: white;
    box-shadow: 0 0 0 5px rgba(83,74,183,0.15);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .step-icon.pending {
    background: transparent;
    border-color: rgba(83,74,183,0.2);
    color: var(--color-text-tertiary);
  }

  .step-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
  }

  .step.done .step-label { color: #534AB7; }
  .step.active .step-label { color: var(--color-text-primary); }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 5px rgba(83,74,183,0.15); }
    50%      { box-shadow: 0 0 0 9px rgba(83,74,183,0.07); }
  }
  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .particle {
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #534AB7;
    opacity: 0;
    pointer-events: none;
  }
  .p1 { top: 20%; left: 8%; animation: float1 5s ease-in-out 0.5s infinite; }
  .p2 { top: 70%; left: 92%; animation: float2 6.5s ease-in-out 1s infinite; }
  .p3 { top: 15%; left: 85%; animation: float1 4.2s ease-in-out 2s infinite; }
  .p4 { top: 80%; left: 12%; animation: float2 5.8s ease-in-out 0.3s infinite; }
  .p5 { top: 45%; left: 96%; width: 3px; height: 3px; animation: float1 7s ease-in-out 1.5s infinite; }
  .p6 { top: 55%; left: 4%; width: 3px; height: 3px; animation: float2 4.8s ease-in-out 0.8s infinite; }

  @keyframes float1 {
    0%,100% { transform: translateY(0px) translateX(0px); opacity: 0.25; }
    33%      { transform: translateY(-18px) translateX(8px); opacity: 0.55; }
    66%      { transform: translateY(10px) translateX(-5px); opacity: 0.3; }
  }
  @keyframes float2 {
    0%,100% { transform: translateY(0px) translateX(0px); opacity: 0.2; }
    40%      { transform: translateY(14px) translateX(-10px); opacity: 0.5; }
    70%      { transform: translateY(-8px) translateX(6px); opacity: 0.25; }
  }
</style>

<div class="stage">
  <div class="bg-grid"></div>

  <div class="particle p1"></div>
  <div class="particle p2"></div>
  <div class="particle p3"></div>
  <div class="particle p4"></div>
  <div class="particle p5"></div>
  <div class="particle p6"></div>

  <div class="brand">SlideForge AI</div>

  <div class="slide-stack">
    <div class="slide slide-3"></div>
    <div class="slide slide-2"></div>
    <div class="slide slide-1">
      <div class="slide-line"></div>
      <div class="slide-line"></div>
      <div class="slide-line"></div>
      <div class="slide-line"></div>
      <div class="dot-row">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>

  <div class="status-text" id="statusText">Generating your presentation…</div>
  <div class="sub-text" id="subText">Crafting slides with AI magic</div>

  <div class="progress-track">
    <div class="progress-bar"></div>
  </div>

  <div class="steps">
    <div class="step done" id="s1">
      <div class="step-icon done"><i class="ti ti-check" aria-hidden="true"></i></div>
      <div class="step-label">Outline</div>
    </div>
    <div class="step active" id="s2">
      <div class="step-icon active"><i class="ti ti-layout-2" aria-hidden="true"></i></div>
      <div class="step-label">Slides</div>
    </div>
    <div class="step pending" id="s3">
      <div class="step-icon pending"><i class="ti ti-palette" aria-hidden="true"></i></div>
      <div class="step-label">Styling</div>
    </div>
    <div class="step pending" id="s4">
      <div class="step-icon pending"><i class="ti ti-download" aria-hidden="true"></i></div>
      <div class="step-label">Export</div>
    </div>
  </div>
</div>

<script>
const stages = [
  { delay: 2800, statusText: "Applying themes & visuals…", subText: "Choosing fonts and colors", active: 2, done: [0,1] },
  { delay: 5200, statusText: "Finalizing animations…",    subText: "Almost there!",            active: 3, done: [0,1,2] },
];

const icons = ['ti-check','ti-layout-2','ti-palette','ti-download'];
const labels = ['Outline','Slides','Styling','Export'];

function updateSteps(activeIdx, doneIdxs) {
  for (let i = 0; i < 4; i++) {
    const s = document.getElementById('s'+(i+1));
    const ic = s.querySelector('.step-icon');
    s.className = 'step ' + (doneIdxs.includes(i) ? 'done' : i === activeIdx ? 'active' : 'pending');
    ic.className = 'step-icon ' + (doneIdxs.includes(i) ? 'done' : i === activeIdx ? 'active' : 'pending');
    ic.innerHTML = `<i class="ti ${doneIdxs.includes(i) ? 'ti-check' : icons[i]}" aria-hidden="true"></i>`;
  }
}

stages.forEach(({ delay, statusText, subText, active, done }) => {
  setTimeout(() => {
    document.getElementById('statusText').textContent = statusText;
    document.getElementById('subText').textContent = subText;
    updateSteps(active, done);
  }, delay);
});
</script>
